<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yu-Gi-Oh! Deck Lab</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .header, .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid #e5e7eb;
    }
    .header { padding: 24px; margin-bottom: 24px; }
    .title { font-size: 32px; font-weight: 700; margin: 0 0 8px; }
    .subtitle { color: #4b5563; margin: 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      border: 1px solid #d1d5db;
      background: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active { background: #111827; color: white; }
    .grid { display: grid; gap: 24px; }
    .grid-2 { grid-template-columns: 1.2fr 0.8fr; }
    .grid-deck { grid-template-columns: 0.95fr 1.05fr; }
    .grid-duel { grid-template-columns: 0.9fr 1.1fr; }
    .card { padding: 20px; }
    .card h2 { margin-top: 0; font-size: 22px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: white;
    }
    .field textarea { min-height: 120px; resize: vertical; }
    .inline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; }
    button.primary, button.secondary, .arrow-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary { background: #111827; color: white; }
    button.secondary { background: white; color: #111827; border: 1px solid #d1d5db; }
    .arrow-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .arrow-btn { background: white; border: 1px solid #d1d5db; }
    .arrow-btn.active { background: #111827; color: white; }
    .preview-box, .list-item, .stat-box, .log-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
    }
    .preview-box { padding: 16px; }
    .muted { color: #6b7280; }
    .list { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow: auto; }
    .list-item { padding: 14px; display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stat-box { padding: 14px; }
    .stat-number { font-size: 26px; font-weight: 700; }
    .duel-box { padding: 14px; border: 1px solid #e5e7eb; border-radius: 14px; }
    .log-list { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow: auto; }
    .log-item { padding: 12px 14px; }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #e5e7eb;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .grid-2, .grid-deck, .grid-duel, .inline-grid, .stats { grid-template-columns: 1fr; }
      .arrow-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const monsterKinds = [
      "Normal", "Effet", "Rituel", "Fusion", "Synchro", "Xyz", "Lien", "Pendule",
      "Pendule / Effet", "Pendule / Normal", "Pendule / Fusion", "Pendule / Synchro",
      "Pendule / Xyz", "Rituel / Pendule", "Jeton"
    ];

    const spellKinds = ["Normale", "Jeu-Rapide", "Continue", "Équipement", "Terrain", "Rituelle"];
    const trapKinds = ["Normal", "Continu", "Contre-piège"];
    const attributes = ["LUMIÈRE", "TÉNÈBRES", "TERRE", "EAU", "FEU", "VENT", "DIVIN"];
    const races = [
      "Aqua", "Bête", "Bête Ailée", "Bête-Guerrier", "Cyberse", "Démon", "Dinosaure", "Dragon",
      "Elfe", "Feu", "Guerrier", "Insecte", "Machine", "Magicien", "Plante", "Poisson",
      "Psychique", "Pyro", "Reptile", "Rocher", "Serpent de Mer", "Tonnerre", "Wyrm", "Zombie",
      "Divin-Bête", "Créateur"
    ];
    const linkArrows = [
      "↖ Haut-Gauche", "↑ Haut", "↗ Haut-Droite", "← Gauche",
      "→ Droite", "↙ Bas-Gauche", "↓ Bas", "↘ Bas-Droite"
    ];

    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    const initialCards = [
      {
        id: uid(),
        name: "Dragon Démo",
        cardType: "Monstre",
        monsterKind: "Effet",
        level: 4,
        attribute: "LUMIÈRE",
        race: "Dragon",
        atk: 1800,
        def: 1200,
        description: "Quand cette carte est invoquée : piochez 1 carte.",
        linkArrows: []
      },
      {
        id: uid(),
        name: "Tourbillon Démo",
        cardType: "Magie",
        spellKind: "Jeu-Rapide",
        description: "Ciblez 1 carte sur le Terrain ; renvoyez-la à la main."
      },
      {
        id: uid(),
        name: "Gardien Réseau",
        cardType: "Monstre",
        monsterKind: "Lien",
        linkRating: 2,
        attribute: "TERRE",
        race: "Cyberse",
        atk: 1400,
        linkArrows: ["↓ Bas", "→ Droite"],
        description: "Si cette carte est Invoquée par Lien : ajoutez 1 monstre Cyberse depuis votre Deck à votre main."
      }
    ];

    const emptyCard = {
      name: "",
      cardType: "Monstre",
      monsterKind: "Effet",
      spellKind: "Normale",
      trapKind: "Normal",
      level: 4,
      rank: 4,
      linkRating: 1,
      pendulumScaleLeft: 1,
      pendulumScaleRight: 1,
      attribute: "LUMIÈRE",
      race: "Dragon",
      atk: 0,
      def: 0,
      linkArrows: [],
      imageUrl: "",
      description: ""
    };

    function countCardKinds(deck) {
      return {
        monsters: deck.filter(c => c.cardType === "Monstre").length,
        spells: deck.filter(c => c.cardType === "Magie").length,
        traps: deck.filter(c => c.cardType === "Piège").length,
      };
    }

    function draw(deck, count = 1) {
      const copy = [...deck];
      const drawn = copy.splice(0, count);
      return { drawn, remaining: copy };
    }

    function aiChoosePlay(hand) {
      const monster = hand.find(c => c.cardType === "Monstre");
      if (monster) return { action: "summon", card: monster, text: `L'IA invoque ${monster.name}.` };
      const spell = hand.find(c => c.cardType === "Magie");
      if (spell) return { action: "spell", card: spell, text: `L'IA active ${spell.name}.` };
      return { action: "pass", text: "L'IA passe son tour." };
    }

    function App() {
      const [cards, setCards] = React.useState(initialCards);
      const [deck, setDeck] = React.useState([]);
      const [form, setForm] = React.useState(emptyCard);
      const [tab, setTab] = React.useState("builder");
      const [duel, setDuel] = React.useState(null);
      const fileInputRef = React.useRef(null);
      const pasteZoneRef = React.useRef(null);

      const stats = React.useMemo(() => countCardKinds(deck), [deck]);

      const update = (key, value) => setForm(prev => ({ ...prev, [key]: value }));

      const fileToDataUrl = (file) => {
        const reader = new FileReader();
        reader.onload = () => {
          setForm(prev => ({ ...prev, imageUrl: String(reader.result || "") }));
        };
        reader.readAsDataURL(file);
      };

      const onImageFileChange = (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        fileToDataUrl(file);
      };

      const onPasteImage = (event) => {
        const items = event.clipboardData && event.clipboardData.items;
        if (!items) return;
        for (const item of items) {
          if (item.type && item.type.startsWith("image/")) {
            const file = item.getAsFile();
            if (file) {
              fileToDataUrl(file);
              event.preventDefault();
              return;
            }
          }
        }
      };

      const onDropImage = (event) => {
        event.preventDefault();
        const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          fileToDataUrl(file);
        }
      };

      const onDragOverImage = (event) => {
        event.preventDefault();
      };

      const toggleArrow = (arrow) => {
        setForm(prev => ({
          ...prev,
          linkArrows: prev.linkArrows.includes(arrow)
            ? prev.linkArrows.filter(a => a !== arrow)
            : [...prev.linkArrows, arrow]
        }));
      };

      const addCard = () => {
        if (!form.name.trim()) return;
        setCards(prev => [...prev, { ...form, id: uid() }]);
        setForm({ ...emptyCard });
      };

      const addToDeck = (card) => setDeck(prev => [...prev, card]);
      const removeFromDeck = (index) => setDeck(prev => prev.filter((_, i) => i !== index));

      const startDuel = () => {
        const playerDeck = [...deck];
        const aiDeck = [...deck].reverse();
        const playerStart = draw(playerDeck, 5);
        const aiStart = draw(aiDeck, 5);
        setDuel({
          turn: 1,
          phase: "Main Phase 1",
          log: ["Le duel commence.", "Vous piochez 5 cartes.", "L'IA pioche 5 cartes."],
          playerLP: 8000,
          aiLP: 8000,
          playerDeck: playerStart.remaining,
          aiDeck: aiStart.remaining,
          playerHand: playerStart.drawn,
          aiHand: aiStart.drawn,
          playerField: [],
          aiField: []
        });
        setTab("duel");
      };

      const nextAITurn = () => {
        if (!duel) return;
        const drawRes = draw(duel.aiDeck, 1);
        const aiHand = [...duel.aiHand, ...drawRes.drawn];
        const play = aiChoosePlay(aiHand);

        let newAiHand = aiHand;
        let newAiField = duel.aiField;

        if (play.card) {
          newAiHand = aiHand.filter(c => c.id !== play.card.id);
          if (play.action === "summon") newAiField = [...duel.aiField, play.card];
        }

        setDuel({
          ...duel,
          turn: duel.turn + 1,
          aiDeck: drawRes.remaining,
          aiHand: newAiHand,
          aiField: newAiField,
          log: [
            ...duel.log,
            `Tour ${duel.turn + 1} — IA`,
            drawRes.drawn[0] ? "L'IA pioche 1 carte." : "L'IA ne peut pas piocher.",
            play.text
          ]
        });
      };

      return (
        <div className="container">
          <div className="header">
            <h1 className="title">Yu-Gi-Oh! Deck Lab</h1>
            <p className="subtitle">Prototype MVP : création de cartes, composition de deck et duel de test contre une IA basique.</p>
          </div>

          <div className="tabs">
            <button className={tab === "builder" ? "tab active" : "tab"} onClick={() => setTab("builder")}>Création</button>
            <button className={tab === "deck" ? "tab active" : "tab"} onClick={() => setTab("deck")}>Deck</button>
            <button className={tab === "duel" ? "tab active" : "tab"} onClick={() => setTab("duel")}>Test IA</button>
          </div>

          {tab === "builder" && (
            <div className="grid grid-2">
              <div className="card">
                <h2>Éditeur de carte</h2>

                <div className="field">
                  <label>Nom</label>
                  <input value={form.name} onChange={e => update("name", e.target.value)} placeholder="Ex. Dragon Éclipse" />
                </div>

                <div className="inline-grid">
                  <div className="field">
                    <label>Type principal</label>
                    <select value={form.cardType} onChange={e => update("cardType", e.target.value)}>
                      <option>Monstre</option>
                      <option>Magie</option>
                      <option>Piège</option>
                    </select>
                  </div>

                  {form.cardType === "Monstre" && (
                    <div className="field">
                      <label>Sous-type monstre</label>
                      <select value={form.monsterKind} onChange={e => update("monsterKind", e.target.value)}>
                        {monsterKinds.map(kind => <option key={kind}>{kind}</option>)}
                      </select>
                    </div>
                  )}

                  {form.cardType === "Magie" && (
                    <div className="field">
                      <label>Sous-type magie</label>
                      <select value={form.spellKind} onChange={e => update("spellKind", e.target.value)}>
                        {spellKinds.map(kind => <option key={kind}>{kind}</option>)}
                      </select>
                    </div>
                  )}

                  {form.cardType === "Piège" && (
                    <div className="field">
                      <label>Sous-type piège</label>
                      <select value={form.trapKind} onChange={e => update("trapKind", e.target.value)}>
                        {trapKinds.map(kind => <option key={kind}>{kind}</option>)}
                      </select>
                    </div>
                  )}
                </div>

                {form.cardType === "Monstre" && (
                  <>
                    <div className="inline-grid">
                      <div className="field">
                        <label>Attribut</label>
                        <select value={form.attribute} onChange={e => update("attribute", e.target.value)}>
                          {attributes.map(item => <option key={item}>{item}</option>)}
                        </select>
                      </div>
                      <div className="field">
                        <label>Race</label>
                        <select value={form.race} onChange={e => update("race", e.target.value)}>
                          {races.map(item => <option key={item}>{item}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="inline-grid">
                      {form.monsterKind.includes("Xyz") ? (
                        <div className="field">
                          <label>Rang</label>
                          <input type="number" value={form.rank} onChange={e => update("rank", Number(e.target.value))} />
                        </div>
                      ) : form.monsterKind.includes("Lien") ? (
                        <div className="field">
                          <label>Classification Lien</label>
                          <input type="number" value={form.linkRating} onChange={e => update("linkRating", Number(e.target.value))} />
                        </div>
                      ) : (
                        <div className="field">
                          <label>Niveau</label>
                          <input type="number" value={form.level} onChange={e => update("level", Number(e.target.value))} />
                        </div>
                      )}

                      <div className="field">
                        <label>ATK</label>
                        <input type="number" value={form.atk} onChange={e => update("atk", Number(e.target.value))} />
                      </div>
                    </div>

                    {!form.monsterKind.includes("Lien") && (
                      <div className="field">
                        <label>DEF</label>
                        <input type="number" value={form.def} onChange={e => update("def", Number(e.target.value))} />
                      </div>
                    )}

                    {form.monsterKind.includes("Pendule") && (
                      <div className="inline-grid">
                        <div className="field">
                          <label>Échelle Pendule gauche</label>
                          <input type="number" value={form.pendulumScaleLeft} onChange={e => update("pendulumScaleLeft", Number(e.target.value))} />
                        </div>
                        <div className="field">
                          <label>Échelle Pendule droite</label>
                          <input type="number" value={form.pendulumScaleRight} onChange={e => update("pendulumScaleRight", Number(e.target.value))} />
                        </div>
                      </div>
                    )}

                    {form.monsterKind.includes("Lien") && (
                      <div className="field">
                        <label>Flèches de Lien</label>
                        <div className="arrow-grid">
                          {linkArrows.map(arrow => (
                            <button
                              key={arrow}
                              className={form.linkArrows.includes(arrow) ? "arrow-btn active" : "arrow-btn"}
                              onClick={() => toggleArrow(arrow)}
                              type="button"
                            >
                              {arrow}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </>
                )}

                <div className="field">
                  <label>Image de la carte</label>
                  <input
                    value={form.imageUrl}
                    onChange={e => update("imageUrl", e.target.value)}
                    placeholder="Colle l'URL d'une image, une capture, ou dépose une image ici"
                  />
                </div>

                <div
                  ref={pasteZoneRef}
                  onPaste={onPasteImage}
                  onDrop={onDropImage}
                  onDragOver={onDragOverImage}
                  tabIndex="0"
                  style={{
                    border:'2px dashed #cbd5e1',
                    borderRadius:'14px',
                    padding:'16px',
                    marginBottom:'14px',
                    background:'#f8fafc',
                    color:'#475569',
                    outline:'none'
                  }}
                >
                  <strong>Ajout direct d'image</strong>
                  <div style={{marginTop:'8px', fontSize:'14px', lineHeight:'1.5'}}>
                    Colle une image avec <strong>Ctrl+V</strong> ou <strong>Cmd+V</strong>,
                    ou glisse-dépose une image dans cette zone.
                  </div>
                </div>

                <div className="button-row" style={{marginBottom:'14px'}}>
                  <button className="secondary" type="button" onClick={() => fileInputRef.current && fileInputRef.current.click()}>
                    Importer depuis un fichier
                  </button>
                  {form.imageUrl && (
                    <button className="secondary" type="button" onClick={() => update("imageUrl", "")}>
                      Supprimer l'image
                    </button>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    style={{display:'none'}}
                    onChange={onImageFileChange}
                  />
                </div>

                <div className="field">
                  <label>Texte / Effet</label>
                  <textarea value={form.description} onChange={e => update("description", e.target.value)} placeholder="Texte de règle, effet ou description..." />
                </div>

                <div className="button-row">
                  <button className="primary" onClick={addCard}>Ajouter à la bibliothèque</button>
                  <button className="secondary" onClick={() => setForm({ ...emptyCard })}>Réinitialiser</button>
                </div>
              </div>

              <div className="card">
                <h2>Aperçu rapide</h2>
                <div className="preview-box">
                  {form.imageUrl ? (
                    <img
                      src={form.imageUrl}
                      alt={form.name || 'Aperçu de carte'}
                      style={{width:'100%', maxHeight:'260px', objectFit:'cover', borderRadius:'12px', marginBottom:'14px', border:'1px solid #e5e7eb'}}
                    />
                  ) : (
                    <div style={{width:'100%', height:'220px', borderRadius:'12px', marginBottom:'14px', border:'1px dashed #d1d5db', display:'flex', alignItems:'center', justifyContent:'center', color:'#6b7280', background:'#f9fafb'}}>
                      Aucune image
                    </div>
                  )}
                  <div style={{display:'flex', justifyContent:'space-between', gap:'10px', alignItems:'center'}}>
                    <strong style={{fontSize:'20px'}}>{form.name || 'Nouvelle carte'}</strong>
                    <span className="badge">{form.cardType}</span>
                  </div>
                  <p className="muted">
                    {form.cardType === 'Monstre'
                      ? `${form.monsterKind} • ${form.attribute} • ${form.race}`
                      : form.cardType === 'Magie'
                        ? `Magie ${form.spellKind}`
                        : `Piège ${form.trapKind}`}
                  </p>
                  {form.cardType === 'Monstre' && (
                    <div>
                      {!form.monsterKind.includes('Lien') && !form.monsterKind.includes('Xyz') && <p>Niveau : {form.level}</p>}
                      {form.monsterKind.includes('Xyz') && <p>Rang : {form.rank}</p>}
                      {form.monsterKind.includes('Lien') && <p>Lien : {form.linkRating}</p>}
                      {form.monsterKind.includes('Pendule') && <p>Échelles : {form.pendulumScaleLeft} / {form.pendulumScaleRight}</p>}
                      {form.monsterKind.includes('Lien') && <p>Flèches : {form.linkArrows.length ? form.linkArrows.join(', ') : 'Aucune'}</p>}
                      <p>ATK : {form.atk}</p>
                      {!form.monsterKind.includes('Lien') && <p>DEF : {form.def}</p>}
                    </div>
                  )}
                  <p>{form.description || 'Aucun texte pour le moment.'}</p>
                </div>
                <p className="muted">Bibliothèque disponible : {cards.length} carte(s).</p>
              </div>
            </div>
          )}

          {tab === "deck" && (
            <div className="grid grid-deck">
              <div className="card">
                <h2>Bibliothèque</h2>
                <div className="list">
                  {cards.map(card => (
                    <div className="list-item" key={card.id}>
                      <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                        {card.imageUrl ? (
                          <img src={card.imageUrl} alt={card.name} style={{width:'72px', height:'96px', objectFit:'cover', borderRadius:'10px', border:'1px solid #e5e7eb'}} />
                        ) : (
                          <div style={{width:'72px', height:'96px', borderRadius:'10px', border:'1px dashed #d1d5db', display:'flex', alignItems:'center', justifyContent:'center', color:'#6b7280', background:'#f9fafb', fontSize:'12px'}}>
                            Sans image
                          </div>
                        )}
                        <div>
                          <div><strong>{card.name}</strong></div>
                          <div className="muted">
                            {card.cardType === 'Monstre'
                              ? `${card.cardType} • ${card.monsterKind}`
                              : card.cardType === 'Magie'
                                ? `${card.cardType} • ${card.spellKind}`
                                : `${card.cardType} • ${card.trapKind}`}
                          </div>
                        </div>
                      </div>
                      <button className="primary" onClick={() => addToDeck(card)}>Ajouter</button>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card">
                <h2>Deck courant</h2>
                <div className="stats">
                  <div className="stat-box"><div className="muted">Total</div><div className="stat-number">{deck.length}</div></div>
                  <div className="stat-box"><div className="muted">Monstres</div><div className="stat-number">{stats.monsters}</div></div>
                  <div className="stat-box"><div className="muted">Magies</div><div className="stat-number">{stats.spells}</div></div>
                  <div className="stat-box"><div className="muted">Pièges</div><div className="stat-number">{stats.traps}</div></div>
                </div>

                <div className="button-row" style={{margin:'16px 0'}}>
                  <button className="primary" onClick={startDuel} disabled={deck.length < 5}>Lancer un test IA</button>
                  <button className="secondary" onClick={() => setDeck([])}>Vider le deck</button>
                </div>

                <div className="list" style={{maxHeight:'380px'}}>
                  {deck.map((card, index) => (
                    <div className="list-item" key={card.id + '-' + index}>
                      <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
                        {card.imageUrl ? (
                          <img src={card.imageUrl} alt={card.name} style={{width:'72px', height:'96px', objectFit:'cover', borderRadius:'10px', border:'1px solid #e5e7eb'}} />
                        ) : (
                          <div style={{width:'72px', height:'96px', borderRadius:'10px', border:'1px dashed #d1d5db', display:'flex', alignItems:'center', justifyContent:'center', color:'#6b7280', background:'#f9fafb', fontSize:'12px'}}>
                            Sans image
                          </div>
                        )}
                        <div>
                          <div><strong>{card.name}</strong></div>
                          <div className="muted">{card.cardType}</div>
                        </div>
                      </div>
                      <button className="secondary" onClick={() => removeFromDeck(index)}>Retirer</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {tab === "duel" && (
            <div className="grid grid-duel">
              <div className="card">
                <h2>Duel de test</h2>
                {!duel ? (
                  <div className="duel-box muted">Ajoute au moins 5 cartes dans ton deck, puis lance un duel de test depuis l'onglet Deck.</div>
                ) : (
                  <>
                    <div className="inline-grid">
                      <div className="stat-box"><div className="muted">Vos LP</div><div className="stat-number">{duel.playerLP}</div></div>
                      <div className="stat-box"><div className="muted">LP IA</div><div className="stat-number">{duel.aiLP}</div></div>
                    </div>
                    <div className="duel-box" style={{margin:'16px 0'}}>
                      <div><strong>Tour {duel.turn}</strong></div>
                      <div className="muted">Phase : {duel.phase}</div>
                      <div className="muted" style={{marginTop:'10px'}}>Main : {duel.playerHand.map(c => c.name).join(', ') || 'Aucune'}</div>
                      <div className="muted" style={{marginTop:'10px'}}>Terrain IA : {duel.aiField.map(c => c.name).join(', ') || 'Vide'}</div>
                    </div>
                    <div className="button-row">
                      <button className="primary" onClick={nextAITurn}>Tour IA suivant</button>
                      <button className="secondary" onClick={startDuel}>Recommencer</button>
                    </div>
                  </>
                )}
              </div>

              <div className="card">
                <h2>Journal du duel</h2>
                <div className="log-list">
                  {duel && duel.log.length ? duel.log.map((entry, index) => (
                    <div className="log-item" key={index}>{entry}</div>
                  )) : <div className="muted">Aucun duel en cours.</div>}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
